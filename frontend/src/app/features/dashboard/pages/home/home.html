<nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
  <span class="text-xl font-bold text-blue-600">CloudRower</span>

  <div class="flex items-center gap-4">
    <span class="text-sm text-gray-600">{{ currentUser?.name || currentUser?.email }}</span>
    <button
      (click)="logout()"
      class="text-sm px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700
             rounded-lg transition-colors duration-200 cursor-pointer"
    >
      Cerrar sesión
    </button>
  </div>
</nav>

<main class="p-8 bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm p-8 text-center">
    <h1 class="text-3xl font-bold text-gray-900 mb-2">
      ¡Bienvenido a CloudRower! 🚀
    </h1>
    <p class="text-gray-500">
      Has iniciado sesión correctamente.
      Esta es tu pantalla de inicio — desde aquí construiremos el resto de la aplicación.
    </p>

    @if (currentUser) {
      <div class="mt-6 p-4 bg-blue-50 rounded-xl text-left">
        <p class="text-sm font-medium text-blue-700 mb-1">Sesión activa</p>
        <p class="text-sm text-blue-600">{{ currentUser.email }}</p>
      </div>
    }
  </div>

</main>
