# Este fichero es solo documentación del formato.
# El inventario real se genera en tiempo de ejecución por el workflow de GitHub Actions
# a partir de los secrets EC2_HOST y EC2_SSH_KEY, para evitar exponer valores sensibles.
#
# Formato equivalente generado dinámicamente:
# [cloudrower]
# cloudrower-ec2 ansible_host=<EC2_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=<KEY_PATH> ansible_ssh_common_args='-o StrictHostKeyChecking=no'
