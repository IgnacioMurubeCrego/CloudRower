name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend
        run: curl -s "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Deploy Frontend
        run: curl -s "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
