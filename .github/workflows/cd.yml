name: CD — Deploy to EC2

on:
  push:
    branches: [develop]

jobs:

  # ── 1. CI: compile backend ──────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn package -DskipTests -B

  # ── 2. CI: compile frontend ─────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── 3. CD: deploy via Ansible (only if both builds pass) ────────────────
  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible and Docker collection
        run: |
          pip install ansible --break-system-packages
          ansible-galaxy collection install community.docker

      - name: Write SSH private key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

      - name: Generate Ansible inventory
        run: |
          printf '[cloudrower]\ncloudrower-ec2 ansible_host=%s ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/ec2_key.pem ansible_ssh_common_args='"'"'-o StrictHostKeyChecking=no'"'"'\n' \
            "${{ secrets.EC2_HOST }}" > /tmp/inventory.ini

      - name: Run Ansible deploy playbook
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        run: |
          ansible-playbook ansible/deploy.yml \
            -i /tmp/inventory.ini

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/ec2_key.pem
