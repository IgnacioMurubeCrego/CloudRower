services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cloudrower
      POSTGRES_USER: ${DB_USER:-cloudrower}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cloudrower}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cloudrower}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cloudrower
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-cloudrower}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-cloudrower}
      JWT_SECRET: ${JWT_SECRET:-changeme-use-a-strong-secret-in-production}
      SPRING_PROFILES_ACTIVE: prod
      DOCKER_HOST: tcp://host.docker.internal:2375
      ALLOWED_ORIGINS: http://localhost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
