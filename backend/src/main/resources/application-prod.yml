spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    show-sql: false

docker:
  host: ${DOCKER_HOST:tcp://localhost:2375}

app:
  jwt:
    secret: ${JWT_SECRET}

ALLOWED_ORIGINS: https://cloudrower-1.onrender.com
