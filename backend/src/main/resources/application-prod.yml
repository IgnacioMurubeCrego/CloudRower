spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

docker:
  host: ${DOCKER_HOST:unix:///var/run/docker.sock}

app:
  jwt:
    secret: ${JWT_SECRET}

ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:http://localhost}
